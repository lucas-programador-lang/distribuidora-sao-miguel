<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>São Miguel | Distribuidora Premium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-wrapper">
        <div class="gradient-sphere sphere-1"></div>
        <div class="gradient-sphere sphere-2"></div>
    </div>

    <div class="main-content">
        <header class="hero-section">
            <div class="logo-box">
                <img src="logo.png" alt="São Miguel" class="logo-img">
            </div>
            <h1 class="reveal-text">São Miguel <span>Distribuidora</span></h1>
            <p class="subtitle">Excelência em Gás e Água Mineral</p>
        </header>

        <section class="products-container">
            <div class="product-card gas">
                <div class="card-inner">
                    <i class="fas fa-fire-alt icon-product"></i>
                    <h3>Gás de Cozinha 13kg</h3>
                    <div class="price">R$ 107,99</div>
                    <small>Retirada no local</small>
                </div>
            </div>

            <div class="product-card water">
                <div class="card-inner">
                    <i class="fas fa-droplet icon-product"></i>
                    <h3>Água Mineral 20L</h3>
                    <div class="price">R$ 6,90</div>
                    <small>Pura e Cristalina</small>
                </div>
            </div>
        </section>

        <section class="map-section">
            <div class="map-card">
                <div class="map-info">
                    <div class="info-block">
                        <i class="fas fa-map-marker-alt"></i>
                        <div>
                            <h4>Visite-nos</h4>
                            <p>Av. Campos Sales, 4487, Nova Floresta</p>
                        </div>
                    </div>
                    <div class="info-block">
                        <i class="far fa-clock"></i>
                        <div>
                            <h4>Horário</h4>
                            <p>Seg-Sex: 07:30-18h | Sáb: 08-13h</p>
                        </div>
                    </div>
                </div>
                <div class="map-frame">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3942.8837136005!2d-63.8821!3d-8.7774!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x92325ce68571853d%3A0x63363383838383!2sAv.%20Campos%20Sales%2C%204487%20-%20Nova%20Floresta%2C%20Porto%20Velho%20-%20RO%2C%2076807-162!5e0!3m2!1spt-BR!2sbr!4v1715000000000!5m2!1spt-BR!2sbr" 
                        allowfullscreen="" 
                        loading="lazy" 
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </div>
        </section>

        <a href="https://wa.me/5569992441223" class="whatsapp-fixed">
            <i class="fab fa-whatsapp"></i> Peça pelo WhatsApp
        </a>
    </div>

</body>
</html>
