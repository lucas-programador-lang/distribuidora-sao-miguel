<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>São Miguel | Distribuidora Ultra</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="glow-container">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>

    <main class="app-card">
        <header class="hero">
            <div class="badge">🔥 Entrega Ultra Rápida</div>
            <h1 class="brand-name">São Miguel</h1>
            <p class="sub-brand">Gás & Água Mineral</p>
        </header>

        <section class="pricing-section">
            <div class="glass-card price-item">
                <div class="item-info">
                    <span class="category">Gás de Cozinha 13kg</span>
                    <h2 class="val">R$ 107,99</h2>
                </div>
                <div class="icon-box"><i class="fas fa-fire-alt"></i></div>
            </div>

            <div class="glass-card price-item featured">
                <div class="item-info">
                    <span class="category">Garrafão 20L</span>
                    <h2 class="val">R$ 6,90</h2>
                </div>
                <div class="icon-box"><i class="fas fa-droplet"></i></div>
            </div>
        </section>

        <div class="payment-badges">
            <span><i class="fas fa-pix"></i> Pix</span>
            <span><i class="fas fa-credit-card"></i> Cartão</span>
            <span><i class="fas fa-money-bill-wave"></i> Dinheiro</span>
        </div>

        <section class="action-grid">
            <a href="https://wa.me/5569992441223" class="cta-button main">
                <div class="btn-content">
                    <i class="fab fa-whatsapp"></i>
                    <span>Pedir Agora</span>
                </div>
                <i class="fas fa-arrow-right arrow"></i>
            </a>

            <div class="address-card">
                <p><i class="fas fa-map-marker-alt"></i> Av. Campos Sales, 4487, Nova Floresta</p>
                <small>Porto Velho - RO</small>
            </div>
        </section>

        <footer class="hours-card">
            <h3><i class="far fa-clock"></i> Horário de Atendimento</h3>
            <div class="row"><span>Segunda - Sexta</span> <strong>07:30 — 18:00</strong></div>
            <div class="row"><span>Sábado</span> <strong>08:00 — 13:00</strong></div>
        </footer>
    </main>

</body>
</html>
